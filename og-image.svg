  <!-- Wifi arcs top-right -->
  <g transform="translate(1000,180)" fill="none" stroke="#f0a500" stroke-width="5" stroke-linecap="round" opacity="0.25">
    <path d="M-28.3,-28.3 A40,40 0 0,1 28.3,-28.3"/>
    <path d="M-53,-53 A75,75 0 0,1 53,-53"/>
    <path d="M-77.8,-77.8 A110,110 0 0,1 77.8,-77.8"/>
    <path d="M-102.5,-102.5 A145,145 0 0,1 102.5,-102.5"/>
  </g>
  <circle cx="1000" cy="180" r="8" fill="#f0a500" opacity="0.35"/>

  <!-- Wifi arcs bottom-left -->
  <g transform="translate(180,480)" fill="none" stroke="#f0a500" stroke-width="4" stroke-linecap="round" opacity="0.15">
    <path d="M-21.2,21.2 A30,30 0 0,0 21.2,21.2"/>
    <path d="M-42.4,42.4 A60,60 0 0,0 42.4,42.4"/>
    <path d="M-63.6,63.6 A90,90 0 0,0 63.6,63.6"/>
