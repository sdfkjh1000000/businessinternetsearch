  <text x="112" y="390" fill="rgba(255,255,255,0.8)" font-family="Segoe UI, Arial, sans-serif" font-size="26">Free ISP quotes for your business. No obligation.</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="622" width="1200" height="8" fill="#f0a500"/>

  <!-- Domain -->
  <text x="80" y="600" fill="rgba(255,255,255,0.5)" font-family="Segoe UI, Arial, sans-serif" font-size="18">businessinternetsearch.sdfkjh.com</text>
