  <!-- Title -->
  <text x="110" y="260" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="62" font-weight="bold">Business Internet</text>
  <text x="110" y="330" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="62" font-weight="bold">Quotes</text>
  <text x="330" y="330" fill="#f0a500" font-family="Segoe UI, Arial, sans-serif" font-size="62" font-weight="bold">— Quick and Easy</text>

